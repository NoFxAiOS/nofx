services:
  # Backend service (API and core logic)
  nofx:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: nofx-trading
    restart: unless-stopped
    stop_grace_period: 30s  # Allow the app 30 seconds for graceful shutdown
    ports:
      - "${NOFX_BACKEND_PORT:-8080}:8080"
      # pprof profiling is bound to host loopback only; uncomment for local debug.
      # - "127.0.0.1:6060:6060"
    volumes:
      # NOTE: .env is bind-mounted so the beginner-onboarding flow
      # (persistBeginnerWalletEnv) can write CLAW402_WALLET_* back to the host
      # file. Without this mount the wallet is regenerated on every container
      # restart. For threat models where the .env file should not be reachable
      # via container RCE, deploy via env vars only and remove this mount.
      - ./.env:/app/.env
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - AI_MAX_TOKENS=8000
      - NOFX_TRUSTED_PRIVATE_API_HOSTS=${NOFX_TRUSTED_PRIVATE_API_HOSTS:-chatgpt-codex-proxy}
    networks:
      - nofx-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend service (static serving and proxy)
  nofx-frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: nofx-frontend
    restart: unless-stopped
    ports:
      - "${NOFX_FRONTEND_PORT:-3000}:80"
    networks:
      - nofx-network
    depends_on:
      - nofx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ChatGPT subscription compatibility sidecar for NOFX's existing OpenAI path.
  # The companion NOFX service allowlists this container hostname via
  # NOFX_TRUSTED_PRIVATE_API_HOSTS so it can be used over the private Docker network.
  chatgpt-codex-proxy:
    profiles: ["chatgpt-codex-proxy"]
    build:
      context: .
      dockerfile: ./docker/Dockerfile.chatgpt-codex-proxy
    container_name: chatgpt-codex-proxy
    restart: unless-stopped
    ports:
      - "${CHATGPT_PROXY_PORT:-8081}:8081"
    environment:
      - PROXY_ADDR=:8081
      - EXPECTED_API_KEY=${CHATGPT_PROXY_SHARED_SECRET:-}
      - CODEX_AUTH_FILE=/run/secrets/codex_auth.json
      - CODEX_CLIENT_VERSION=${CHATGPT_PROXY_CLIENT_VERSION:-0.133.0}
      - CODEX_CLIENT_NAME=${CHATGPT_PROXY_CLIENT_NAME:-codex_cli_rs}
      - CODEX_BASE_URL=${CHATGPT_PROXY_BASE_URL:-}
    volumes:
      - ${CHATGPT_PROXY_AUTH_FILE:-./.chatgpt-proxy-disabled-auth.json}:/run/secrets/codex_auth.json:ro
    networks:
      - nofx-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  nofx-network:
    driver: bridge
