    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#1A1813" opacity="0.07"/>
    </pattern>
  </defs>

  <g clip-path="url(#frame)">
